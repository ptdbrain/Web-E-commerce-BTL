<!DOCTYPE html>
<html lang="vi">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Giỏ hàng - Tech-Geeks</title>
    <link rel="stylesheet" href="style.css" />
    <link rel="stylesheet" href="cart.css" />
</head>

<body>
    <header>
        <h1>Tech-Geeks</h1>
        <nav>
            <a href="index.html">Trang chủ</a>
            <a href="#">Sản phẩm</a>
            <a href="cart.html">Giỏ hàng</a>
        </nav>
    </header>

    <main class="cart-container">
        <h2>Giỏ hàng của bạn</h2>

        <table class="cart-table">
            <thead>
                <tr>
                    <th>Sản phẩm</th>
                    <th>Đơn giá</th>
                    <th>Số lượng</th>
                    <th>Thành tiền</th>
                    <th>Xóa</th>
                </tr>
            </thead>
            <tbody>
                <tr>
                    <td>Laptop Dell XPS 15</td>
                    <td>25.990.000 đ</td>
                    <td>
                        <button onclick="changeQty(this, -1)">-</button>
                        <span>1</span>
                        <button onclick="changeQty(this, 1)">+</button>
                    </td>
                    <td class="subtotal">25.990.000 đ</td>
                    <td><button class="btn-remove" onclick="removeItem(this)">✕</button></td>
                </tr>
                <tr>
                    <td>Macbook Air M2</td>
                    <td>28.990.000 đ</td>
                    <td>
                        <button onclick="changeQty(this, -1)">-</button>
                        <span>1</span>
                        <button onclick="changeQty(this, 1)">+</button>
                    </td>
                    <td class="subtotal">28.990.000 đ</td>
                    <td><button class="btn-remove" onclick="removeItem(this)">✕</button></td>
                </tr>
            </tbody>
        </table>

        <div class="cart-summary">
            <p>Tổng cộng: <strong id="total">54.980.000 đ</strong></p>
            <button class="btn-checkout">Tiến hành thanh toán</button>
        </div>
    </main>

    <footer>
        <p>© 2024 Tech-Geeks</p>
    </footer>

    <script>
        function changeQty(btn, delta) {
            const span = btn.parentElement.querySelector("span");
            const current = parseInt(span.textContent);
            if (current + delta >= 1) span.textContent = current + delta;
        }

        function removeItem(btn) {
            btn.closest("tr").remove();
        }
    </script>
</body>

</html>
