<!DOCTYPE html>
<html lang="vi">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Tech-Geeks - Cửa hàng laptop, PC chính hãng</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <header>
      <h1>Tech-Geeks</h1>
      <nav>
        <a href="#">Trang chủ</a>
        <a href="#">Sản phẩm</a>
        <a href="#">Giỏ hàng</a>
      </nav>
    </header>

    <main>
      <section class="products">
        <h2>Sản phẩm nổi bật</h2>
        <div class="product-list">
          <div class="product-card">
            <img src="https://placehold.co/200x150" alt="Laptop" />
            <h3>Laptop Dell XPS 15</h3>
            <p>25.990.000 đ</p>
            <button>Thêm vào giỏ</button>
          </div>
          <div class="product-card">
            <img src="https://placehold.co/200x150" alt="Laptop" />
            <h3>Macbook Air M2</h3>
            <p>28.990.000 đ</p>
            <button>Thêm vào giỏ</button>
          </div>
          <div class="product-card">
            <img src="https://placehold.co/200x150" alt="PC" />
            <h3>PC Gaming RTX 4060</h3>
            <p>18.500.000 đ</p>
            <button>Thêm vào giỏ</button>
          </div>
        </div>
      </section>
    </main>

    <footer>
      <p>© 2024 Tech-Geeks</p>
    </footer>
  </body>
</html>
